<!DOCTYPE html>
<html>
<body style="width: 300px; padding: 20px;">
  <h3>本地LLM划词翻译</h3>
  <p>状态: <span id="status">检查中...</span></p>
  <button id="testBtn">测试连接</button>
  <div id="result" style="margin-top: 10px; color: #666;"></div>
  
  <script>
    // 检查chrome.runtime是否可用
    const statusEl = document.getElementById('status');
    const resultEl = document.getElementById('result');
    
    if (typeof chrome === 'undefined') {
      statusEl.textContent = '错误: chrome对象不存在';
      statusEl.style.color = 'red';
    } else if (!chrome.runtime) {
      statusEl.textContent = '错误: chrome.runtime不存在';
      statusEl.style.color = 'red';
    } else {
      statusEl.textContent = '正常';
      statusEl.style.color = 'green';
    }
    
    document.getElementById('testBtn').addEventListener('click', async () => {
      try {
        resultEl.textContent = '测试中...';
        const response = await chrome.runtime.sendMessage({action: 'testConnection'});
        resultEl.textContent = JSON.stringify(response);
      } catch (e) {
        resultEl.textContent = '错误: ' + e.message;
        resultEl.style.color = 'red';
      }
    });
  </script>
</body>
</html>
