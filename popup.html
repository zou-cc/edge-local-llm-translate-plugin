<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { 
      width: 350px; 
      padding: 15px; 
      font-family: Arial, sans-serif;
    }
    .section {
      background: #f5f5f5;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
    }
    label {
      display: block;
      margin: 8px 0 3px;
      font-size: 12px;
      font-weight: bold;
    }
    input, select {
      width: 100%;
      padding: 6px;
      font-size: 12px;
      box-sizing: border-box;
    }
    button {
      padding: 8px 15px;
      margin: 5px 0;
      cursor: pointer;
    }
    .btn-primary {
      background: #4CAF50;
      color: white;
      border: none;
      width: 100%;
    }
    .btn-secondary {
      background: #ddd;
      border: none;
    }
    .status {
      font-size: 11px;
      margin-left: 5px;
    }
    .success { color: green; }
    .error { color: red; }
  </style>
</head>
<body>
  <h3>本地LLM划词翻译设置</h3>
  
  <div class="section">
    <label>API地址</label>
    <input type="text" id="apiUrl" value="http://localhost:11434">
    
    <label>模型名称</label>
    <input type="text" id="modelName" value="qwen3.5:35b">
    
    <button id="testBtn" class="btn-secondary">测试连接</button>
    <span id="status" class="status"></span>
  </div>
  
  <button id="saveBtn" class="btn-primary">保存设置</button>

  <script>
    console.log('Popup loaded');
    
    // 测试连接
    document.getElementById('testBtn').addEventListener('click', async () => {
      console.log('Test button clicked');
      const statusEl = document.getElementById('status');
      statusEl.textContent = '测试中...';
      
      try {
        const response = await chrome.runtime.sendMessage({ action: 'testConnection' });
        console.log('Response:', response);
        
        if (response.success && response.connected) {
          statusEl.textContent = '✓ 连接成功';
          statusEl.className = 'status success';
        } else {
          statusEl.textContent = '✗ 连接失败';
          statusEl.className = 'status error';
        }
      } catch (error) {
        console.error('Error:', error);
        statusEl.textContent = '错误: ' + error.message;
        statusEl.className = 'status error';
      }
    });
    
    // 保存
    document.getElementById('saveBtn').addEventListener('click', async () => {
      const config = {
        engineType: 'ollama',
        apiUrl: document.getElementById('apiUrl').value.trim(),
        modelName: document.getElementById('modelName').value.trim(),
        targetLanguage: '中文',
        ttsRate: 1.0,
        sourceLanguages: ['英文'],
        autoTranslate: true,
        wordThreshold: 20
      };
      
      try {
        await chrome.runtime.sendMessage({ action: 'setConfig', config });
        document.getElementById('saveBtn').textContent = '已保存!';
        setTimeout(() => {
          document.getElementById('saveBtn').textContent = '保存设置';
        }, 2000);
      } catch (error) {
        console.error('Save error:', error);
      }
    });
    
    // 加载现有配置
    chrome.runtime.sendMessage({ action: 'getConfig' })
      .then(response => {
        if (response.success && response.data) {
          document.getElementById('apiUrl').value = response.data.apiUrl || 'http://localhost:11434';
          document.getElementById('modelName').value = response.data.modelName || 'qwen3.5:35b';
        }
      })
      .catch(console.error);
  </script>
</body>
</html>
