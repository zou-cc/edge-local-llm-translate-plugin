<!DOCTYPE html>
<html>
<body style="width: 400px; padding: 20px; font-family: monospace;">
  <h3>调试信息</h3>
  <div id="log" style="background: #f5f5f5; padding: 10px; white-space: pre-wrap;"></div>
  <button id="test" style="margin-top: 10px; padding: 10px;">测试连接</button>
  
  <script>
    const log = (msg) => {
      document.getElementById('log').textContent += msg + '\n';
    };
    
    log('页面加载完成');
    log('chrome.runtime: ' + (typeof chrome !== 'undefined' && chrome.runtime ? '可用' : '不可用'));
    
    document.getElementById('test').addEventListener('click', () => {
      log('\n--- 按钮点击 ---');
      log('准备发送消息...');
      
      try {
        chrome.runtime.sendMessage({action: 'testConnection'})
          .then(response => {
            log('收到响应: ' + JSON.stringify(response));
          })
          .catch(error => {
            log('错误: ' + error.message);
          });
      } catch (e) {
        log('异常: ' + e.message);
      }
    });
  </script>
</body>
</html>
