<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>本地LLM划词翻译 - 设置</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
    .section { background: #f5f5f5; padding: 15px; margin: 15px 0; border-radius: 8px; }
    h2 { margin-top: 0; }
    label { display: block; margin: 10px 0 5px; font-weight: bold; }
    input, select { width: 100%; padding: 8px; margin-bottom: 10px; }
    button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    .btn-primary { background: #4CAF50; color: white; border: none; }
    .btn-secondary { background: #ddd; border: none; }
    #connectionStatus { margin-left: 10px; color: #666; }
    .success { color: green !important; }
    .error { color: red !important; }
  </style>
</head>
<body>
  <h1>本地LLM划词翻译设置</h1>
  
  <div class="section">
    <h2>模型设置</h2>
    <label>引擎类型</label>
    <select id="engineType">
      <option value="ollama" selected>Ollama</option>
      <option value="vllm">vLLM</option>
    </select>
    
    <label>API地址</label>
    <input type="text" id="apiUrl" value="http://localhost:11434">
    
    <label>模型名称</label>
    <input type="text" id="modelName" value="qwen3.5:35b" placeholder="qwen3.5:35b">
    
    <button id="testConnectionBtn" class="btn-secondary">测试连接</button>
    <span id="connectionStatus"></span>
  </div>
  
  <div class="section">
    <h2>语言设置</h2>
    <label>目标语言</label>
    <select id="targetLanguage">
      <option value="中文" selected>中文</option>
      <option value="英文">英文</option>
    </select>
  </div>
  
  <div class="section">
    <h2>语音设置</h2>
    <label>语速: <span id="ttsRateValue">1.0</span>x</label>
    <input type="range" id="ttsRate" min="0.5" max="2" step="0.1" value="1">
  </div>
  
  <button id="saveBtn" class="btn-primary">保存设置</button>
  <div id="saveStatus" style="margin-top: 10px;"></div>

  <script>
    console.log('Options page loaded');
    
    // 检查chrome.runtime
    if (typeof chrome === 'undefined' || !chrome.runtime) {
      document.body.innerHTML = '<div style="color: red; padding: 20px;">错误：必须通过扩展管理页面打开此页面</div>';
      throw new Error('Extension context not available');
    }
    
    // 加载配置
    async function loadConfig() {
      try {
        const response = await chrome.runtime.sendMessage({ action: 'getConfig' });
        console.log('Config loaded:', response);
        if (response.success && response.data) {
          document.getElementById('apiUrl').value = response.data.apiUrl || 'http://localhost:11434';
          document.getElementById('modelName').value = response.data.modelName || 'qwen3.5:35b';
          document.getElementById('targetLanguage').value = response.data.targetLanguage || '中文';
          document.getElementById('ttsRate').value = response.data.ttsRate || 1;
        }
      } catch (error) {
        console.error('Failed to load config:', error);
      }
    }
    
    // 测试连接
    document.getElementById('testConnectionBtn').addEventListener('click', async () => {
      const statusEl = document.getElementById('connectionStatus');
      statusEl.textContent = '测试中...';
      statusEl.className = '';
      
      try {
        console.log('Testing connection...');
        const response = await chrome.runtime.sendMessage({ action: 'testConnection' });
        console.log('Test result:', response);
        
        if (response.success && response.connected) {
          statusEl.textContent = '连接成功!';
          statusEl.className = 'success';
        } else {
          statusEl.textContent = '连接失败';
          statusEl.className = 'error';
        }
      } catch (error) {
        console.error('Test failed:', error);
        statusEl.textContent = '错误: ' + error.message;
        statusEl.className = 'error';
      }
    });
    
    // 保存配置
    document.getElementById('saveBtn').addEventListener('click', async () => {
      const config = {
        engineType: document.getElementById('engineType').value,
        apiUrl: document.getElementById('apiUrl').value.trim(),
        modelName: document.getElementById('modelName').value.trim(),
        targetLanguage: document.getElementById('targetLanguage').value,
        ttsRate: parseFloat(document.getElementById('ttsRate').value),
        sourceLanguages: ['英文'],
        autoTranslate: true,
        wordThreshold: 20
      };
      
      try {
        const response = await chrome.runtime.sendMessage({ action: 'setConfig', config });
        const statusEl = document.getElementById('saveStatus');
        if (response.success) {
          statusEl.textContent = '设置已保存!';
          statusEl.style.color = 'green';
        } else {
          statusEl.textContent = '保存失败';
          statusEl.style.color = 'red';
        }
        setTimeout(() => statusEl.textContent = '', 3000);
      } catch (error) {
        console.error('Save failed:', error);
        document.getElementById('saveStatus').textContent = '保存错误: ' + error.message;
      }
    });
    
    // 语速显示
    document.getElementById('ttsRate').addEventListener('input', (e) => {
      document.getElementById('ttsRateValue').textContent = e.target.value;
    });
    
    // 初始化
    loadConfig();
  </script>
</body>
</html>
